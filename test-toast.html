<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Test</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f3f4f6; }
        
        /* Toast styles */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        
        .toast {
            pointer-events: auto;
            min-width: 320px;
            max-width: 400px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid;
            transition: all 0.3s ease;
        }
        
        .toast-success {
            background: rgba(236, 253, 245, 0.95);
            border-color: #a7f3d0;
        }
        
        .toast-error {
            background: rgba(254, 242, 242, 0.95);
            border-color: #fecaca;
        }
        
        .toast-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
        }
        
        .toast-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toast-success .toast-icon {
            background: #d1fae5;
            color: #059669;
        }
        
        .toast-error .toast-icon {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .toast-body {
            flex: 1;
            min-width: 0;
        }
        
        .toast-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .toast-success .toast-title {
            color: #065f46;
        }
        
        .toast-error .toast-title {
            color: #991b1b;
        }
        
        .toast-message {
            font-size: 12px;
        }
        
        .toast-success .toast-message {
            color: #10b981;
        }
        
        .toast-error .toast-message {
            color: #ef4444;
        }
        
        .toast-close {
            flex-shrink: 0;
            padding: 4px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .toast-success .toast-close {
            color: #6ee7b7;
        }
        
        .toast-success .toast-close:hover {
            color: #059669;
            background: #d1fae5;
        }
        
        .toast-error .toast-close {
            color: #fca5a5;
        }
        
        .toast-error .toast-close:hover {
            color: #dc2626;
            background: #fee2e2;
        }
        
        .toast-progress {
            height: 4px;
            width: 100%;
            overflow: hidden;
        }
        
        .toast-progress-bar {
            height: 100%;
            transition: width 0.1s linear;
        }
        
        .toast-success .toast-progress-bar {
            background: #34d399;
        }
        
        .toast-error .toast-progress-bar {
            background: #f87171;
        }
        
        /* Test buttons */
        .test-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-success {
            background: linear-gradient(to right, #f59e0b, #f97316);
            color: #1e293b;
        }
        
        .btn-error {
            background: #dc2626;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
    <h1>Toast Notification Test</h1>
    <p>Click buttons below to test toast notifications:</p>
    
    <!-- Toast Container -->
    <div class="toast-container"
         x-data="{
             toasts: [],
             init() {
                 window.addEventListener('toast', (e) => {
                     const { message, type = 'info', title } = e.detail;
                     this.show(message, type, title);
                 });
                 
                 window.addEventListener('cart-toast', (e) => {
                     const { productName, quantity } = e.detail;
                     this.show(`${productName} × ${quantity} added to cart`, 'success', 'Added to cart!');
                 });
             },
             show(message, type, title) {
                 const id = Date.now();
                 const toast = {
                     id,
                     message,
                     type,
                     title: title || (type === 'success' ? 'Success!' : 'Error'),
                     visible: true,
                     progress: 100
                 };
                 this.toasts.push(toast);
                 this.startProgress(id);
             },
             startProgress(id) {
                 const toast = this.toasts.find(t => t.id === id);
                 if (!toast) return;
                 
                 const duration = 4000;
                 const interval = 50;
                 const step = 100 / (duration / interval);
                 
                 const timer = setInterval(() => {
                     const t = this.toasts.find(t => t.id === id);
                     if (!t) {
                         clearInterval(timer);
                         return;
                     }
                     
                     t.progress -= step;
                     
                     if (t.progress <= 0) {
                         clearInterval(timer);
                         this.remove(id);
                     }
                 }, interval);
             },
             remove(id) {
                 const index = this.toasts.findIndex(t => t.id === id);
                 if (index > -1) {
                     this.toasts[index].visible = false;
                     setTimeout(() => {
                         this.toasts = this.toasts.filter(t => t.id !== id);
                     }, 300);
                 }
             }
         }"
         x-init="init()"
    >
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-full"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-full"
                 class="toast"
                 :class="toast.type === 'success' ? 'toast-success' : 'toast-error'"
            >
                <div class="toast-content">
                    <div class="toast-icon">
                        <template x-if="toast.type === 'success'">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </template>
                        <template x-if="toast.type === 'error'">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                        </template>
                    </div>
                    <div class="toast-body">
                        <div class="toast-title" x-text="toast.title"></div>
                        <div class="toast-message" x-text="toast.message"></div>
                    </div>
                    <button @click="remove(toast.id)" class="toast-close">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="toast-progress">
                    <div class="toast-progress-bar" :style="{ width: toast.progress + '%' }"></div>
                </div>
            </div>
        </template>
    </div>
    
    <div class="test-buttons">
        <button class="btn btn-success" onclick="window.dispatchEvent(new CustomEvent('cart-toast', { detail: { productName: 'BMW ABC123', quantity: 2 } }))">
            Test Success Toast
        </button>
        <button class="btn btn-error" onclick="window.dispatchEvent(new CustomEvent('toast', { detail: { message: 'Failed to add item', type: 'error' } }))">
            Test Error Toast
        </button>
    </div>
</body>
</html>
