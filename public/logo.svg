<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="OeParts">
  <!-- Mark: hex bolt + blueprint tick -->
  <g>
    <!-- Outer hex bolt (ink) -->
    <path d="M30 3 L53 16 L53 44 L30 57 L7 44 L7 16 Z" fill="#0B1A29"/>
    <!-- Inner hex (ivory) -->
    <path d="M30 13 L44.5 21.5 L44.5 38.5 L30 47 L15.5 38.5 L15.5 21.5 Z" fill="#F4EFE1"/>
    <!-- Center cross (ink) -->
    <path d="M30 18 L30 42 M18 30 L42 30" stroke="#0B1A29" stroke-width="2.5" stroke-linecap="square"/>
    <!-- Center dot (amber) -->
    <circle cx="30" cy="30" r="3.2" fill="#F59E0B"/>
    <!-- Corner register marks (amber) -->
    <rect x="5" y="5" width="4" height="1.5" fill="#F59E0B"/>
    <rect x="5" y="5" width="1.5" height="4" fill="#F59E0B"/>
    <rect x="51" y="5" width="4" height="1.5" fill="#F59E0B"/>
    <rect x="53.5" y="5" width="1.5" height="4" fill="#F59E0B"/>
    <rect x="5" y="53.5" width="4" height="1.5" fill="#F59E0B"/>
    <rect x="5" y="51" width="1.5" height="4" fill="#F59E0B"/>
    <rect x="51" y="53.5" width="4" height="1.5" fill="#F59E0B"/>
    <rect x="53.5" y="51" width="1.5" height="4" fill="#F59E0B"/>
  </g>

  <!-- Wordmark: OeParts -->
  <g transform="translate(72 0)">
    <!-- Rule above -->
    <rect x="0" y="10" width="18" height="2" fill="#F59E0B"/>
    <!-- Section tag -->
    <text x="22" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="8" font-weight="700" letter-spacing="1.8" fill="#7A8795">—01 — GENUINE PARTS</text>
    <!-- OeParts -->
    <text x="0" y="40" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-1.2" fill="#0B1A29">Oe</text>
    <text x="38" y="40" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="28" font-weight="300" letter-spacing="-1.2" fill="#F59E0B">Parts</text>
    <!-- Dotted rule below -->
    <line x1="0" y1="48" x2="128" y2="48" stroke="#0B1A29" stroke-width="1" stroke-dasharray="1 2"/>
    <text x="0" y="57" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="7" font-weight="700" letter-spacing="1.6" fill="#1F2D3D">INDEX — EU — REV.2026</text>
  </g>
</svg>
