<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" fill="#0B1A29"/>
  <!-- Grid texture -->
  <g opacity="0.12" stroke="#F59E0B" stroke-width="1">
    <line x1="0" y1="45" x2="180" y2="45"/>
    <line x1="0" y1="90" x2="180" y2="90"/>
    <line x1="0" y1="135" x2="180" y2="135"/>
    <line x1="45" y1="0" x2="45" y2="180"/>
    <line x1="90" y1="0" x2="90" y2="180"/>
    <line x1="135" y1="0" x2="135" y2="180"/>
  </g>
  <!-- Hex bolt ivory -->
  <path d="M90 30 L148 62 L148 118 L90 150 L32 118 L32 62 Z" fill="#F4EFE1"/>
  <!-- Cross -->
  <path d="M90 50 L90 130 M50 90 L130 90" stroke="#0B1A29" stroke-width="10" stroke-linecap="square"/>
  <!-- Amber center dot -->
  <circle cx="90" cy="90" r="12" fill="#F59E0B"/>
  <!-- Register ticks top-left/right amber -->
  <rect x="10" y="10" width="18" height="4" fill="#F59E0B"/>
  <rect x="10" y="10" width="4" height="18" fill="#F59E0B"/>
  <rect x="152" y="10" width="18" height="4" fill="#F59E0B"/>
  <rect x="166" y="10" width="4" height="18" fill="#F59E0B"/>
  <rect x="10" y="166" width="18" height="4" fill="#F59E0B"/>
  <rect x="10" y="152" width="4" height="18" fill="#F59E0B"/>
  <rect x="152" y="166" width="18" height="4" fill="#F59E0B"/>
  <rect x="166" y="152" width="4" height="18" fill="#F59E0B"/>
</svg>
