name: Release

# Build + publish an OeParts release when a v*.*.* tag is pushed (Module 21, Chunk 5.2).
# Replaces the earlier ad-hoc in-place zip with the real pipeline: build/build.sh produces
# the distributable zip + per-file sha256 manifest, oeparts:release:manifest folds the zip's
# sha256/size into version.json and upserts releases.json, and both manifests are published
# to `main` (raw-served to the in-app updater) and attached to the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, zip, openssl, mbstring, curl, fileinfo, json, bcmath, gd, intl
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # .env must exist before composer install: its post-autoload-dump hook runs
      # `artisan package:discover`, which boots the app. Use .env.testing (array/
      # sqlite drivers, APP_ENV=testing), same as tests.yml — .env.example sets
      # APP_ENV=production + CACHE_STORE=redis, which needs a live Redis service
      # this job doesn't run just to let the app boot for discovery/build commands.
      - name: Prepare environment file
        run: cp .env.testing .env

      # Root dev deps so `php artisan` (oeparts:build / oeparts:release:manifest) can boot.
      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate

      # git archive -> composer --no-dev -> npm build -> strip -> sha256 manifest -> zip.
      - name: Build release zip
        run: bash build/build.sh

      # Fold the zip's sha256/size/download-url into version.json, SIGN it (RSA-SHA256),
      # and upsert releases.json. OE_RELEASE_PRIVATE_KEY is a repo secret (never committed);
      # every install verifies against the baked public key at pre-flight.
      - name: Generate release manifests
        run: php artisan oeparts:release:manifest --build-result=dist/build-result.json
        env:
          OE_RELEASE_PRIVATE_KEY: ${{ secrets.OE_RELEASE_PRIVATE_KEY }}

      # Publish the served manifests to main (raw.githubusercontent.com/.../main/*.json).
      - name: Publish manifests to main
        run: |
          cp version.json /tmp/version.json
          cp releases.json /tmp/releases.json
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/version.json version.json
          cp /tmp/releases.json releases.json
          git add version.json releases.json
          git commit -m "chore(release): ${GITHUB_REF_NAME} manifest + catalog [skip ci]" || echo "nothing to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OeParts ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/oeparts-*.zip
            version.json
            releases.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
