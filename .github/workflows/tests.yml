name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Laravel 12
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # openssl (backup cipher), fileinfo/curl (download/upload), zip (release
          # zip + e2e ZipArchive), gd/intl (Filament) — the update-system e2e needs these.
          extensions: mbstring, bcmath, pdo, pdo_sqlite, sqlite3, xml, zip, openssl, fileinfo, curl, gd, intl
          coverage: none

      # Must run before `composer install` — its post-autoload-dump hook boots
      # the framework (artisan package:discover), and without a .env present
      # APP_ENV falls back to 'production', which trips AppServiceProvider's
      # Redis-driver guard (CLAUDE.md rule #7) since CI has no Redis service.
      - name: Copy test environment
        run: cp .env.testing .env

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      # Prove every migration's up() applies cleanly in order on a fresh database.
      # down() reversibility for the update-system migrations is asserted in the suite
      # (UpdateSystemSchemaTest), and the full apply→rollback + backup→restore round-trips
      # are covered end-to-end by UpdateSystemE2ETest.
      - name: Verify migrations apply
        run: php artisan migrate:fresh --no-interaction

      - name: Run tests
        run: php artisan test --parallel
