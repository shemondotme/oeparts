services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.4'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.4/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - mailpit
    mysql:
        image: 'mysql:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    # Always-on: processes the app's three real queues (see app/Jobs — 'critical'
    # is order confirmation/OTP/password-reset/webhook/invoice, 'default' is
    # tracking/newsletter/backup/admin-notification mail, 'low' is SendTestEmailJob).
    queue-worker:
        build:
            context: './vendor/laravel/sail/runtimes/8.4'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.4/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        command: 'php artisan queue:work redis --queue=critical,default,low --tries=3 --backoff=3,10,30 --sleep=1'
        restart: unless-stopped

    # --- Opt-in: PHP 8.x compatibility matrix (docker compose --profile matrix ...) ---
    # Floor is 8.3, NOT 8.2: filament/actions' openspout/openspout dependency (v4.32.0)
    # requires PHP ~8.3.0 || ~8.4.0 || ~8.5.0 — a real upstream constraint, confirmed by
    # a failed `composer install` under PHP 8.2 (Filament export features pull it in).
    # Each version gets its own named vendor volume so `composer install` output never
    # crosses PHP versions. Run via: docker/run-matrix.sh (composer test:matrix).
    php83:
        build:
            context: './vendor/laravel/sail/runtimes/8.3'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.3/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            # Matrix containers are disposable one-shot test runners (not the
            # persistent dev container), and the named vendor-phpNN volume is
            # root-owned by default — running as root here avoids a permission
            # error when `composer install` tries to create vendor/<pkg> dirs.
            SUPERVISOR_PHP_USER: root
        volumes:
            - '.:/var/www/html'
            - 'vendor-php83:/var/www/html/vendor'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        profiles: ['matrix']

    php85:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.5/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            SUPERVISOR_PHP_USER: root
        volumes:
            - '.:/var/www/html'
            - 'vendor-php85:/var/www/html/vendor'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        profiles: ['matrix']

    # --- Opt-in: shared-hosting simulation (docker compose --profile hostingsim up) ---
    # Reuses the 8.3 runtime image (the most common shared-host default) and mounts a
    # restrictive php.ini (exec/proc_open/etc. disabled — see docker/hostingsim/) plus
    # env overrides forcing sync queue / file cache+session / log mail, so the
    # Update/Backup/Recovery system (CLAUDE.md rules #41-52) can be validated without
    # any of the conveniences (Redis, a worker, shell functions) real shared hosting
    # doesn't guarantee.
    hostingsim:
        build:
            context: './vendor/laravel/sail/runtimes/8.3'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.3/app'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        env_file:
            - .env.docker.hostingsim
        volumes:
            - '.:/var/www/html'
            - './docker/hostingsim/php.ini-overrides:/etc/php/8.3/cli/conf.d/99-hostingsim.ini:ro'
        networks:
            - sail
        depends_on:
            - mysql
        profiles: ['hostingsim']
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    vendor-php83:
        driver: local
    vendor-php85:
        driver: local
